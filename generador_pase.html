<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pase VIP - Bautizo Eithan</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Cargamos html2canvas para la generación de imagen nativa -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column; /* Coloca el botón abajo de la tarjeta */
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5e7eb; /* Fondo gris claro para destacar la tarjeta */
            font-family: 'Montserrat', sans-serif;
        }

        /* Contenedor de la Tarjeta (Formato Móvil vertical) */
        .vip-card {
            width: 380px;
            height: 680px;
            background-color: #0f172a; /* Azul marino ultra oscuro */
            /* Patrón de puntos estilo espía/tecnológico */
            background-image: radial-gradient(#1e293b 2px, transparent 2px);
            background-size: 20px 20px;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
            border: 2px solid #1e293b;
        }

        /* Marco de escaneo (esquinas) */
        .scanner-frame {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(56, 182, 255, 0.2);
            pointer-events: none;
        }
        .scanner-frame::before, .scanner-frame::after,
        .scanner-frame .bottom-corners::before, .scanner-frame .bottom-corners::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: #38b6ff; /* Celeste Jefe en Pañales */
            border-style: solid;
        }
        .scanner-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; }
        .scanner-frame::after { top: 0; right: 0; border-width: 3px 3px 0 0; }
        .bottom-corners::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
        .bottom-corners::after { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

        /* Etiqueta Top Secret */
        .badge-warning {
            background-color: #f59e0b; /* Amarillo/Dorado */
            color: #000;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            padding: 4px 12px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-radius: 4px;
            z-index: 2;
        }

        .title {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            text-align: center;
            z-index: 2;
        }

        .subtitle {
            color: #38b6ff;
            font-family: 'Courier Prime', monospace;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 30px;
            z-index: 2;
        }

        /* Foto del Agente (Bebé) */
        .agent-photo-container {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #38b6ff;
            padding: 4px;
            position: relative;
            margin-bottom: 25px;
            z-index: 2;
            box-shadow: 0 0 20px rgba(56, 182, 255, 0.4);
        }
        .agent-photo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        /* Icono de lente de espía */
        .spy-icon {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #0f172a;
            border-radius: 50%;
            padding: 6px;
            border: 2px solid #38b6ff;
        }

        /* Datos de la Misión */
        .mission-data {
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            border-left: 4px solid #38b6ff;
            padding: 15px;
            margin-bottom: 30px;
            z-index: 2;
            box-sizing: border-box;
        }
        .data-row {
            display: flex;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .data-row:last-child { margin-bottom: 0; }
        .data-label {
            color: #9ca3af;
            font-family: 'Courier Prime', monospace;
            width: 90px;
            font-weight: bold;
        }
        .data-value {
            color: #ffffff;
            font-weight: 600;
            flex: 1;
        }

        /* Zona del QR */
        .qr-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }
        .qr-container {
            background: #ffffff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .qr-container img {
            width: 110px;
            height: 110px;
            display: block;
        }
        .qr-text {
            color: #38b6ff;
            font-family: 'Courier Prime', monospace;
            font-size: 0.75rem;
            text-align: center;
            letter-spacing: 1px;
            max-width: 80%;
        }

        /* Decoración de Barras Laterales */
        .barcode {
            position: absolute;
            right: 15px;
            top: 30%;
            writing-mode: vertical-rl;
            color: rgba(255,255,255,0.1);
            font-family: 'Courier Prime', monospace;
            font-size: 1.5rem;
            letter-spacing: 4px;
        }

        /* Botón de descarga premium */
        .download-btn {
            margin-top: 25px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            color: #ffffff;
            border: 2px solid #38b6ff;
            padding: 12px 28px;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            font-size: 0.95rem;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 15px -3px rgba(56, 182, 255, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }
        .download-btn:hover {
            background: #38b6ff;
            color: #0f172a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -3px rgba(56, 182, 255, 0.4);
        }
        .download-btn:active {
            transform: translateY(0);
        }
        .download-btn svg {
            transition: transform 0.3s ease;
        }
        .download-btn:hover svg {
            transform: translateY(2px);
        }

    </style>
</head>
<body>

    <!-- TARJETA VIP -->
    <div class="vip-card" id="capture-zone">
        <!-- Esquinas del escáner -->
        <div class="scanner-frame"><div class="bottom-corners"></div></div>
        
        <div class="barcode">|||| ||||| |||| || |</div>

        <div class="badge-warning">CLASIFICADO</div>
        
        <div class="title">PASE VIP</div>
        <div class="subtitle">AGENTE INVITADO</div>

        <!-- Foto del Jefe en Pañales -->
        <div class="agent-photo-container">
            <img src="https://i0.wp.com/cinemedios.com/wp-content/uploads/2021/07/jefeenpanales2.jpg?fit=1200%2C675&ssl=1" alt="Jefe Eithan" class="agent-photo" crossorigin="anonymous">
            
            <svg class="spy-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#38b6ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        </div>

        <!-- Información de la Misión -->
        <div class="mission-data">
            <div class="data-row">
                <div class="data-label">AGENTE:</div>
                <div class="data-value">Eithan Daniel</div>
            </div>
            <div class="data-row">
                <div class="data-label">MISIÓN:</div>
                <div class="data-value">Bautizo y 1er Año</div>
            </div>
            <div class="data-row">
                <div class="data-label">FECHA:</div>
                <div class="data-value">27 de Junio, 2026</div>
            </div>
        </div>

        <!-- Código QR Dinámico -->
        <div class="qr-zone">
            <div class="qr-container">
                <img id="qr-code-img" src="" alt="QR Code" crossorigin="anonymous">
            </div>
            <div class="qr-text">ESCANEA O TOCA PARA ABRIR EL EXPEDIENTE</div>
        </div>
    </div>

    <!-- Botón de Descarga -->
    <button id="btn-download" class="download-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Descargar Pase (PNG)
    </button>

    <script>
        /**
         * ==========================================
         * CONFIGURACIÓN DE TU PASE VIP
         * ==========================================
         */
        const linkInvitacion = "https://angelo-azcorra.github.io/invitaciones/index.html"; 
        const qrImageElement = document.getElementById('qr-code-img');
        
        // API de QR Server para generar un QR en tiempo real
        const qrApiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&color=0f172a&bgcolor=ffffff&data=${encodeURIComponent(linkInvitacion)}`;
        qrImageElement.src = qrApiUrl;

        /**
         * Lógica de Descarga como Imagen PNG
         */
        document.getElementById('btn-download').addEventListener('click', () => {
            const btn = document.getElementById('btn-download');
            
            // Efecto loading visual
            btn.innerHTML = `
                <svg class="playing" style="animation: spin 1s linear infinite;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="12" y1="2" x2="12" y2="6"></line>
                    <line x1="12" y1="18" x2="12" y2="22"></line>
                    <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                    <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                    <line x1="2" y1="12" x2="6" y2="12"></line>
                    <line x1="18" y1="12" x2="22" y2="12"></line>
                    <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                    <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
                </svg>
                Generando Pase...
            `;
            btn.style.opacity = '0.7';
            btn.style.pointerEvents = 'none';

            // Agregamos estilos CSS clave para animación de loading interna
            const style = document.createElement('style');
            style.innerHTML = '@keyframes spin { 100% { transform: rotate(360deg); } }';
            document.head.appendChild(style);

            // Ejecutamos html2canvas sobre el contenedor del pase
            html2canvas(document.getElementById('capture-zone'), {
                useCORS: true,
                allowTaint: true,
                scale: 2, // Calidad de Render x2 para redes móviles
                backgroundColor: '#0f172a'
            }).then(canvas => {
                // Generamos descarga vía link invisible
                const link = document.createElement('a');
                link.download = 'Pase_VIP_Eithan_Daniel.png';
                link.href = canvas.toDataURL('image/png');
                link.click();

                // Reestablecemos el botón a su estado normal
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Descargar Pase (PNG)
                `;
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            }).catch(err => {
                console.error("Error capturando imagen del pase: ", err);
                btn.innerHTML = 'Error al exportar';
                btn.style.background = '#dc2626';
                btn.style.borderColor = '#dc2626';
                
                setTimeout(() => {
                    btn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Descargar Pase (PNG)
                    `;
                    btn.style.background = '';
                    btn.style.borderColor = '';
                    btn.style.opacity = '1';
                    btn.style.pointerEvents = 'auto';
                }, 2500);
            });
        });
    </script>
</body>
</html>
